<svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
<title>Matching engine architecture</title>
<desc>Order feed sends orders into the OrderBook core engine, which processes them through price levels, the match loop, and trade emission, then returns trade and book updates to the caller.</desc>
<style>
@keyframes dash { to { stroke-dashoffset: -22; } }
.flow { stroke-dasharray: 6 5; animation: dash 1s linear infinite; }
.flow-slow { stroke-dasharray: 5 5; animation: dash 1.4s linear infinite; }
</style>

<rect x="0" y="0" width="700" height="400" rx="12" fill="#0a0e1a"/>

<text x="350" y="30" text-anchor="middle" font-size="17" font-weight="600" fill="#38bdf8">Matching engine architecture</text>
<text x="350" y="50" text-anchor="middle" font-size="12" fill="#64748b">OrderBook (core engine) orchestrates three processing stages</text>

<rect x="180" y="80" width="480" height="150" rx="12" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4 4"/>
<text x="420" y="100" text-anchor="middle" font-size="12.5" font-weight="600" fill="#94a3b8">OrderBook (core engine)</text>

<g>
<rect x="30" y="130" width="120" height="66" rx="8" fill="#0f1524" stroke="#60a5fa" stroke-width="1.3"/>
<text x="90" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#93c5fd">Order feed</text>
<text x="90" y="174" text-anchor="middle" font-size="10.5" fill="#60a5fa">
<tspan x="90" dy="0">add_limit /</tspan>
<tspan x="90" dy="13">add_market / cancel</tspan>
</text>
</g>

<g>
<rect x="200" y="115" width="130" height="70" rx="8" fill="#0f1524" stroke="#a78bfa" stroke-width="1.3"/>
<text x="265" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#c4b5fd">Price levels</text>
<text x="265" y="158" text-anchor="middle" font-size="10.5" fill="#a78bfa">
<tspan x="265" dy="0">std::map bids / asks</tspan>
<tspan x="265" dy="13">price priority</tspan>
</text>
</g>

<g>
<rect x="350" y="115" width="130" height="70" rx="8" fill="#0f1524" stroke="#2dd4bf" stroke-width="1.3"/>
<text x="415" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">Match loop</text>
<text x="415" y="158" text-anchor="middle" font-size="10.5" fill="#2dd4bf">
<tspan x="415" dy="0">crosses check,</tspan>
<tspan x="415" dy="13">FIFO fills</tspan>
</text>
</g>

<g>
<rect x="500" y="115" width="130" height="70" rx="8" fill="#0f1524" stroke="#fbbf24" stroke-width="1.3"/>
<text x="565" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#fde68a">Trade emit</text>
<text x="565" y="158" text-anchor="middle" font-size="10.5" fill="#fbbf24">
<tspan x="565" dy="0">builds Trade,</tspan>
<tspan x="565" dy="13">fires callback</tspan>
</text>
</g>

<defs>
<marker id="ah-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ah-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ah-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<line x1="150" y1="163" x2="197" y2="150" class="flow" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#ah-blue)"/>
<line x1="330" y1="150" x2="347" y2="150" class="flow-slow" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#ah-slate)"/>
<line x1="480" y1="150" x2="497" y2="150" class="flow-slow" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#ah-slate)"/>

<path d="M565 185 L565 210 L250 210 L250 280" fill="none" class="flow" stroke="#fbbf24" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ah-amber)"/>

<rect x="110" y="280" width="280" height="66" rx="8" fill="#0f1524" stroke="#64748b" stroke-width="1.3"/>
<text x="250" y="306" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Trade &amp; book updates</text>
<text x="250" y="324" text-anchor="middle" font-size="10.5" fill="#94a3b8">returned to caller with fills</text>

<g font-size="10.5" fill="#94a3b8">
<rect x="140" y="372" width="9" height="9" rx="2" fill="#0f1524" stroke="#60a5fa"/><text x="154" y="380">Data source</text>
<rect x="250" y="372" width="9" height="9" rx="2" fill="#0f1524" stroke="#a78bfa"/><text x="264" y="380">Price priority</text>
<rect x="370" y="372" width="9" height="9" rx="2" fill="#0f1524" stroke="#2dd4bf"/><text x="384" y="380">Matching</text>
<rect x="470" y="372" width="9" height="9" rx="2" fill="#0f1524" stroke="#fbbf24"/><text x="484" y="380">Output</text>
</g>
</svg>
